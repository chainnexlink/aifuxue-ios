name: H5 构建并部署到服务器

on:
  push:
    branches: [master]
    paths:
      - 'client/src/**'
      - 'client/index.html'
      - 'client/vite.config.ts'
      - 'client/package.json'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: 构建 H5 并部署
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          cd client
          npm ci

      - name: 构建 H5
        run: |
          cd client
          npm run build:h5

      - name: 部署到服务器
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          TARGET: ${{ secrets.SERVER_H5_PATH }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          echo "=== Testing SSH connection ==="
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${USER}@${HOST} "echo SSH_OK && mkdir -p ${TARGET}"
          echo "=== Uploading files ==="
          cd client/dist/build/h5
          tar czf /tmp/h5.tar.gz .
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no /tmp/h5.tar.gz ${USER}@${HOST}:/tmp/
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${USER}@${HOST} "cd ${TARGET} && tar xzf /tmp/h5.tar.gz && rm /tmp/h5.tar.gz && echo 'Files extracted OK'"
          rm /tmp/deploy_key /tmp/h5.tar.gz
          echo "=== Deploy completed ==="

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: AiFuXue-H5
          path: client/dist/build/h5/
          retention-days: 7
