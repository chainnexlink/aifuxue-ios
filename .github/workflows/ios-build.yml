name: Build iOS & Upload to App Store Connect
# Workflow for building AiFuXue iOS app
on:
  workflow_dispatch:
    inputs:
      upload_to_appstore:
        description: 'Upload to App Store Connect'
        required: true
        default: 'true'
        type: boolean

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Fix App Icon (remove alpha channel)
        run: |
          ICON="aifuxue-ios/AiFuXue/Assets.xcassets/AppIcon.appiconset/icon-1024.png"
          if [ -f "$ICON" ]; then
            echo "Removing alpha channel from app icon..."
            pip3 install Pillow --quiet
            python3 << 'PYEOF'
          import sys
          from PIL import Image
          icon = "aifuxue-ios/AiFuXue/Assets.xcassets/AppIcon.appiconset/icon-1024.png"
          img = Image.open(icon)
          if img.mode in ('RGBA', 'LA', 'PA'):
              bg = Image.new('RGB', img.size, (15, 17, 24))
              bg.paste(img, mask=img.split()[-1])
              bg.save(icon)
              print('Alpha channel removed')
          elif img.mode != 'RGB':
              img.convert('RGB').save(icon)
              print('Converted to RGB')
          else:
              print('Already RGB')
          PYEOF
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Setup API Key file
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" > ~/.private_keys/AuthKey.p8
          echo "API_KEY_PATH=$HOME/.private_keys/AuthKey.p8" >> $GITHUB_ENV

      - name: Setup Keychain for Code Signing
        run: |
          KEYCHAIN_PASSWORD="ci_build_temp_pwd_$(date +%s)"
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          curl -sO https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -sO https://www.apple.com/certificateauthority/AppleWWDRCAG6.cer
          security import AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security import AppleWWDRCAG6.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          rm -f AppleWWDRCAG3.cer AppleWWDRCAG6.cer

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Build and Upload with Fastlane
        working-directory: aifuxue-ios
        run: |
          if [ "${{ inputs.upload_to_appstore }}" = "true" ]; then
            fastlane release
          else
            fastlane build_only
          fi

      - name: Upload IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AiFuXue-iOS
          path: aifuxue-ios/*.ipa
          retention-days: 30
          if-no-files-found: ignore
